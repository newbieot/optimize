<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimalisasi Pengiriman PosIND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        posblue: '#1C2D5A',
                        posorange: '#EF4123',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="bg-white shadow-md py-4 px-8 flex justify-between items-center">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/45/Logo_1_tahun_Danantara.svg/3840px-Logo_1_tahun_Danantara.svg.png" alt="Danantara" class="h-12">
        <h1 class="text-2xl font-bold text-posblue text-center flex-1">Portal Kalkulasi & Optimalisasi Tarif PosIND</h1>
        <img src="https://www.posindonesia.co.id/_next/image?url=https%3A%2F%2Fadmin-piol.posindonesia.co.id%2Fmedia%2FUntitled%20design%20(7).png&w=750&q=75" alt="PosIND" class="h-10">
    </header>

    <main class="max-w-5xl mx-auto mt-8 bg-white p-8 rounded-lg shadow">
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div>
                <label class="block text-sm font-semibold text-posblue mb-2">Berat Kiriman (Kg)</label>
                <input type="number" id="berat" class="w-full border border-gray-300 p-2 rounded focus:ring-posorange focus:border-posorange" value="10" min="1">
            </div>
            <div>
                <label class="block text-sm font-semibold text-posblue mb-2">Rute 1: Origin - Hub</label>
                <select id="rute1" class="w-full border border-gray-300 p-2 rounded focus:ring-posorange focus:border-posorange">
                    <option value="13477">Batam (29400) - Jakarta (10000) : Rp 13.477/kg</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-posblue mb-2">Rute 2: Hub - Tujuan</label>
                <select id="rute2" class="w-full border border-gray-300 p-2 rounded focus:ring-posorange focus:border-posorange">
                    <option value="34801">Jakarta (10000) - Kupang : Rp 34.801/kg</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end mb-8">
            <button onclick="hitungOptimalisasi()" class="bg-posorange hover:bg-red-600 text-white font-bold py-2 px-6 rounded shadow">
                Kalkulasi Tarif
            </button>
        </div>

        <div id="hasil-container" class="hidden">
            <h2 class="text-xl font-bold text-posblue mb-4 border-b pb-2">Hasil Kalkulasi Optimalisasi</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left text-gray-700 border" id="tableHasil">
                    <thead class="text-xs text-white uppercase bg-posblue">
                        <tr>
                            <th class="px-4 py-3">Deskripsi Komponen</th>
                            <th class="px-4 py-3 text-right">Nilai (Rp)</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyHasil" class="divide-y">
                        </tbody>
                </table>
            </div>

            <div class="mt-6 flex justify-end">
                <button onclick="exportToExcel()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded shadow flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    Download .xlsx
                </button>
            </div>
        </div>

    </main>

    <script>
        let dataExport = [];

        function hitungOptimalisasi() {
            const berat = parseFloat(document.getElementById('berat').value);
            const tarifRute1_perKg = parseFloat(document.getElementById('rute1').value);
            const tarifRute2_perKg = parseFloat(document.getElementById('rute2').value);

            if (!berat || berat <= 0) {
                alert("Masukkan berat kiriman yang valid.");
                return;
            }

            // Komponen Dasar
            const collecting = 1000;
            const processing = 1000;
            const biayaRute1 = tarifRute1_perKg * berat;
            const biayaRute2 = tarifRute2_perKg * berat;
            
            // Delivery: =2775+((berat kiriman-3)*2300)
            const delivery = 2775 + ((berat - 3) * 2300);

            // Total Optimalisasi
            const totalOptimalisasi = collecting + processing + biayaRute1 + biayaRute2 + delivery;

            // Overhead & COF
            const overhead = totalOptimalisasi * 0.05;
            const cof = (30 / 365) * 0.08 * totalOptimalisasi;

            // Total Biaya
            const totalBiaya = totalOptimalisasi + overhead + cof;

            // Target Margin 15%
            // Rumus User: Margin = Laba / Total Biaya. Berarti Laba = 15% dari Total Biaya
            const laba = 0.15 * totalBiaya;

            // Rumus User: Laba = DPP - Total Biaya -> DPP = Total Biaya + Laba
            const dpp = totalBiaya + laba;

            // Rumus User: DPP = Nilai Proyek * 100 / 101.1 -> Nilai Proyek = DPP * 101.1 / 100
            const nilaiProyek = dpp * 1.011;

            // PPN = DPP * 1.1%
            const ppn = dpp * 0.011;

            const marginPersen = (laba / totalBiaya) * 100;

            // Menyiapkan Data untuk Tabel HTML & Excel
            dataExport = [
                { "Komponen": "Berat Kiriman (Kg)", "Nilai": berat },
                { "Komponen": "Nilai Proyek (Otomatis untuk Margin 15%)", "Nilai": nilaiProyek },
                { "Komponen": "DPP", "Nilai": dpp },
                { "Komponen": "PPN (1.1%)", "Nilai": ppn },
                { "Komponen": "Collecting", "Nilai": collecting },
                { "Komponen": "Processing", "Nilai": processing },
                { "Komponen": "Biaya Rute BTM - CGK", "Nilai": biayaRute1 },
                { "Komponen": "Biaya Rute CGK - Tujuan", "Nilai": biayaRute2 },
                { "Komponen": "Delivery", "Nilai": delivery },
                { "Komponen": "Total Optimalisasi", "Nilai": totalOptimalisasi },
                { "Komponen": "Overhead (5%)", "Nilai": overhead },
                { "Komponen": "COF (Cost of Fund)", "Nilai": cof },
                { "Komponen": "Total Biaya", "Nilai": totalBiaya },
                { "Komponen": "Laba", "Nilai": laba },
                { "Komponen": "Margin (%)", "Nilai": marginPersen.toFixed(2) + "%" }
            ];

            // Render ke Tabel HTML
            const tbody = document.getElementById('tbodyHasil');
            tbody.innerHTML = '';
            
            dataExport.forEach(item => {
                let formattedValue = typeof item.Nilai === 'number' 
                    ? new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR' }).format(item.Nilai) 
                    : item.Nilai;
                
                // Pengecualian format untuk baris Berat Kiriman
                if(item.Komponen === "Berat Kiriman (Kg)") formattedValue = item.Nilai + " Kg";

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-4 py-2 font-medium text-gray-900 whitespace-nowrap">${item.Komponen}</td>
                    <td class="px-4 py-2 text-right">${formattedValue}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('hasil-container').classList.remove('hidden');
        }

        function exportToExcel() {
            if (dataExport.length === 0) return;

            // Buat Workbook & Worksheet menggunakan SheetJS
            const ws = XLSX.utils.json_to_sheet(dataExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Optimalisasi Tarif");

            // Simpan File
            XLSX.writeFile(wb, "Kalkulasi_Optimalisasi_PosIND.xlsx");
        }
    </script>
</body>
</html>
